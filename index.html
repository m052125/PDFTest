<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APIデバッグツール</title>
<style>
  body { background:#0a0f1e; color:#f1f5f9; font-family:monospace; padding:16px; font-size:13px; }
  h2 { color:#60a5fa; font-family:sans-serif; }
  .btn { background:#3b82f6; color:#fff; border:none; border-radius:8px; padding:12px 20px; font-size:14px; font-weight:700; cursor:pointer; width:100%; margin-top:8px; }
  .btn:disabled { background:#243048; color:#64748b; cursor:not-allowed; }
  .upload-zone { border:2px dashed #243048; border-radius:10px; padding:24px; text-align:center; cursor:pointer; margin:12px 0; }
  .upload-zone.has { border-color:#3b82f6; }
  .box { background:#111827; border:1px solid #243048; border-radius:8px; padding:12px; margin-top:10px; white-space:pre-wrap; word-break:break-all; max-height:400px; overflow-y:auto; }
  .ok  { color:#22c55e; }
  .err { color:#ef4444; }
  .warn{ color:#f59e0b; }
  .info{ color:#60a5fa; }
  .dim { color:#64748b; }
  textarea { width:100%; background:#111827; border:1px solid #243048; border-radius:8px; color:#f1f5f9; padding:10px; font-family:monospace; font-size:12px; margin-top:8px; }
</style>
</head>
<body>
<h2>🔬 APIデバッグツール</h2>
<p class="dim">APIの生レスポンスをそのまま表示します</p>

<div class="upload-zone" id="zone" onclick="document.getElementById('fi').click()"
  ondragover="event.preventDefault()" ondrop="e=>{e.preventDefault();load(e.dataTransfer.files[0])}">
  <div id="zoneText" style="color:#64748b">PDFまたは画像を選択</div>
</div>
<input type="file" id="fi" accept=".pdf,image/*" style="display:none" onchange="load(this.files[0])">

<button class="btn" id="btn" onclick="run()" disabled>🔍 APIを叩く</button>

<div id="log" class="box"><span class="dim">ログがここに表示されます</span></div>

<div id="rawSection" style="display:none">
  <p style="color:#94a3b8;margin-top:14px;font-family:sans-serif">📄 生レスポンス（全文）</p>
  <textarea id="rawBox" rows="12" readonly></textarea>
</div>

<script>
let imgBase64 = null, imgType = null;
const log = document.getElementById('log');

function addLog(msg, cls='info'){
  const s = document.createElement('span');
  s.className = cls;
  s.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n';
  log.appendChild(s);
  log.scrollTop = log.scrollHeight;
}

async function load(file){
  if(!file) return;
  log.innerHTML = '';
  addLog('ファイル: ' + file.name);
  addLog('サイズ: ' + (file.size/1024).toFixed(1) + ' KB');
  addLog('MIME: ' + (file.type||'不明'));

  const isPdf = file.type==='application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  document.getElementById('zoneText').textContent = file.name + (isPdf ? ' (変換中...)' : '');
  document.getElementById('zone').classList.add('has');

  try {
    if(isPdf){
      addLog('PDF→画像変換開始...');
      imgBase64 = await pdfToBase64(file);
      imgType = 'image/png';
      addLog('変換完了 base64長: ' + imgBase64.length + ' chars', 'ok');
      addLog('推定画像サイズ: ' + (imgBase64.length * 0.75 / 1024).toFixed(0) + ' KB', 'ok');
    } else {
      const du = await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(file);});
      imgBase64 = du.split(',')[1];
      imgType = file.type;
      addLog('画像読み込み完了 base64長: ' + imgBase64.length + ' chars', 'ok');
    }
    document.getElementById('zoneText').textContent = file.name + ' ✔';
    document.getElementById('btn').disabled = false;
  } catch(e) {
    addLog('変換エラー: ' + e.message, 'err');
  }
}

async function pdfToBase64(file){
  if(!window.pdfjsLib){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload=res; s.onerror=()=>rej(new Error('PDF.js読み込み失敗'));
      document.head.appendChild(s);
    });
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
  addLog('PDFページ数: ' + pdf.numPages);
  const canvases = [];
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const vp = page.getViewport({scale:2.5});
    const c = document.createElement('canvas');
    c.width=vp.width; c.height=vp.height;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    canvases.push(c);
    addLog('  ページ'+i+': '+vp.width.toFixed(0)+'x'+vp.height.toFixed(0)+'px');
  }
  const totalH=canvases.reduce((s,c)=>s+c.height,0);
  const maxW=Math.max(...canvases.map(c=>c.width));
  const m=document.createElement('canvas');
  m.width=maxW; m.height=totalH;
  const mc=m.getContext('2d');
  mc.fillStyle='#fff'; mc.fillRect(0,0,maxW,totalH);
  let y=0; canvases.forEach(c=>{mc.drawImage(c,0,y);y+=c.height;});
  return m.toDataURL('image/png').split(',')[1];
}

async function run(){
  if(!imgBase64) return;
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = '⏳ 送信中...';
  document.getElementById('rawSection').style.display = 'none';
  document.getElementById('rawBox').value = '';

  addLog('--- API送信開始 ---');
  addLog('エンドポイント: https://api.anthropic.com/v1/messages');
  addLog('モデル: claude-sonnet-4-20250514');
  addLog('max_tokens: 4000');
  addLog('画像サイズ(base64): ' + imgBase64.length + ' chars → 約' + (imgBase64.length*0.75/1024).toFixed(0) + 'KB');

  try {
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: 'あなたはラクロスの試合データを紙のシートから読み取る専門家です。画像を見て内容をJSONで返してください。必ずJSONのみ出力し、マークダウンや説明文は不要です。',
      messages: [{
        role: 'user',
        content: [
          {type:'image', source:{type:'base64', media_type:imgType, data:imgBase64}},
          {type:'text', text:'この画像の内容をJSONで出力してください。{"description":"画像の説明","data":"読み取れたデータ"}の形式で。'}
        ]
      }]
    };

    addLog('fetch開始...');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });

    addLog('HTTPステータス: ' + res.status + ' ' + res.statusText, res.ok ? 'ok' : 'err');
    addLog('レスポンスヘッダー:');
    for(const [k,v] of res.headers.entries()){
      addLog('  ' + k + ': ' + v, 'dim');
    }

    const rawText = await res.text();
    addLog('レスポンス文字数: ' + rawText.length, rawText.length > 0 ? 'ok' : 'err');

    document.getElementById('rawSection').style.display = 'block';
    document.getElementById('rawBox').value = rawText;

    // JSONパース試行
    try {
      const json = JSON.parse(rawText);
      addLog('JSONパース: 成功', 'ok');
      if(json.error){
        addLog('APIエラー type: ' + json.error.type, 'err');
        addLog('APIエラー message: ' + json.error.message, 'err');
      } else if(json.content){
        addLog('content blocks: ' + json.content.length, 'ok');
        addLog('stop_reason: ' + json.stop_reason, json.stop_reason==='end_turn'?'ok':'warn');
        const textBlock = json.content.find(b=>b.type==='text');
        if(textBlock){
          addLog('テキスト長: ' + textBlock.text.length + ' chars', 'ok');
          addLog('テキスト先頭100文字: ' + textBlock.text.slice(0,100), 'ok');
        } else {
          addLog('textブロックなし！', 'err');
        }
      } else {
        addLog('予期しないレスポンス構造', 'warn');
      }
    } catch(pe) {
      addLog('JSONパース失敗: ' + pe.message, 'err');
      addLog('生テキスト先頭200文字: ' + rawText.slice(0,200), 'warn');
    }

  } catch(e) {
    addLog('fetch自体が失敗: ' + e.message, 'err');
    addLog('原因の可能性:', 'warn');
    addLog('  - CORS（ブラウザがリクエストをブロック）', 'warn');
    addLog('  - ネットワーク接続なし', 'warn');
    addLog('  - SSL証明書エラー', 'warn');
  }

  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = '🔍 APIを叩く';
  addLog('--- 完了 ---');
}
</script>

</body>
</html>
